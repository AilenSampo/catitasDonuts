<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catita's Donuts - Venta de mini donitas</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand&family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>

<body>
   <header>
        <div class="logo">
            <a href="/index.html">
                <img src="images/logoDonuts.png" alt="Logo de Catita Donas" class="logo-animado">
            </a>
        </div>
        <button class="hamburger-menu" aria-label="Abrir menú">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#sobre">Sobre Catita</a></li>
                <li><a href="#sabores">Sabores</a></li>
                <li><a href="#pedidos">Pedidos</a></li>
                <li><a href="#juegos">Juegos</a></li>
            </ul>
        </nav>
    </header>
    
    <title>¡Juego Arma tu Dona Soñada! 🍩✨ Catitas Donuts</title>
    <h1>🍩 ¡Arma tu Dona Soñada! ✨</h1>
    <p>¡Elige tu glaseado y tus chispitas favoritas para crear la dona más deliciosa!</p>

    <div class="dona-builder">
        <div class="dona-preview">
            <div id="dona-base" class="dona-part base-img"></div>
            <div id="dona-glaze" class="dona-part"></div>
            <div id="dona-sprinkles" class="dona-part"></div>
        </div>

        <div class="controls">
            <h3>¡Elige tu Glaseado!</h3>
            <div class="control-group">
                <button onclick="setGlaze('blanco')" id="glaze-blanco">🤍 Blanco</button>
                <!-- <button onclick="setGlaze('celeste')" id="glaze-celeste">💙 Celeste</button> -->
                <button onclick="setGlaze('chocolate')" id="glaze-chocolate">🍫 Choco</button>
                <button onclick="setGlaze('rosa')" id="glaze-rosa">🩷 Rosa</button>
            </div>

            <h3>¡Y tus Chispitas!</h3>
            <div class="control-group">
                <button onclick="setSprinkles('colores')" id="sprinkles-colores">🌈 Colores</button>
                <button onclick="setSprinkles('corazones')" id="sprinkles-corazones">💖 Corazones</button>
                <button onclick="setSprinkles('estrellas')" id="sprinkles-estrellas">🌟 Estrellas</button>
            </div>
        </div>

        <button id="reset-button" onclick="resetDona()">¡Empezar de Nuevo! 🔄</button>
    </div>

    <script>
        const donaBase = document.getElementById('dona-base');
        const donaGlaze = document.getElementById('dona-glaze');
        const donaSprinkles = document.getElementById('dona-sprinkles');

        const glazeButtons = document.querySelectorAll('.control-group button[onclick^="setGlaze"]');
        const sprinklesButtons = document.querySelectorAll('.control-group button[onclick^="setSprinkles"]');

        function updateButtonState(buttons, selectedId) {
            buttons.forEach(btn => {
                if (btn.id === selectedId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function setGlaze(type) {
            donaGlaze.className = 'dona-part glaseado-' + type;
            updateButtonState(glazeButtons, 'glaze-' + type);
        }

        function setSprinkles(type) {
            donaSprinkles.className = 'dona-part chispitas-' + type;
            updateButtonState(sprinklesButtons, 'sprinkles-' + type);
        }

        function resetDona() {
            donaGlaze.className = 'dona-part';
            donaSprinkles.className = 'dona-part';
            glazeButtons.forEach(btn => btn.classList.remove('active'));
            sprinklesButtons.forEach(btn => btn.classList.remove('active'));
        }


        document.addEventListener('DOMContentLoaded', () => {

            resetDona(); 
        });
    </script>
</body>
</html>
