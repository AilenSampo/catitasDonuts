<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Demo Donitas</title>
<style>
  :root { --rosa:#f06bb4; --celeste:#25c4ea; --fondo:#ffeef6; }
  body { font-family: system-ui, Arial, sans-serif; background: var(--fondo); margin: 0; padding: 24px; color:#333; }
  h2 { color: var(--rosa); font-size: 32px; margin: 0 0 12px; }
  .limit-selection { text-align:center; margin: 16px 0 8px; }
  .limit-selection button { border:0; padding:12px 20px; border-radius:24px; margin:8px auto; display:block; cursor:pointer; font-weight:700; }
  #select-12 { background: var(--celeste); color:#fff; }
  #select-18 { background: var(--rosa); color:#fff; }
  .active { box-shadow: 0 8px 18px rgba(0,0,0,.15); transform: translateY(-1px); }
  .total-selected { text-align:center; font-size:22px; color:var(--rosa); margin: 12px 0 24px; }
  .cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:16px; }
  .card { background:#fff; border-radius:16px; padding:16px; box-shadow: 0 6px 16px rgba(0,0,0,.08); }
  .card h3 { margin: 8px 0 6px; color: var(--rosa); }
  .cantidad-selector { display:flex; align-items:center; gap:12px; justify-content:center; margin-top:12px; }
  .cantidad-selector button { width:40px; height:40px; border-radius:20px; border:0; font-size:20px; cursor:pointer; background:#eee; }
  .cantidad-actual { min-width:24px; text-align:center; font-weight:700; }
  .resumen { background:#ffd7eb; padding:16px; border-radius:16px; margin-top:24px; }
</style>
</head>
<body>

<h2>Nuestros sabores favoritos</h2>

<div class="limit-selection">
  <p>¿Cuántas donitas quieres en tu combo?</p>
  <button id="select-12" type="button">12 Donitas</button>
  <button id="select-18" type="button">18 Donitas</button>
</div>

<p class="total-selected">
  Llevas seleccionadas:
  <span id="selected-count" class="selected-count">0</span>
  de
  <span id="current-limit" class="current-limit">12</span>
</p>

<div class="cards" id="cards"></div>

<div class="resumen">
  <strong>Tu selección: <span id="resumen-total">0/12</span></strong>
  <div id="resumen-items" style="margin-top:8px;"></div>
</div>
<button id="reset-combo" class="boton">Vaciar selección</button>

<script>
/* ------------------ Datos de ejemplo ------------------ */
const DONAS = [
  { id: 1, name: 'Chocolate con Cobertura', description: 'Dona de masa de chocolate con baño liso.' },
  { id: 2, name: 'Frutilla con Glasé', description: 'Dulce, rosita y feliz.' },
  { id: 3, name: 'Clásica Azucarada', description: 'La favorita de la abuela.' },
];

/* ------------------ Estado + persistencia ------------------ */
let currentLimit = parseInt(localStorage.getItem('donitasLimit'), 10) || 12;
let selectedDonuts = JSON.parse(localStorage.getItem('donitasSeleccion')) || {}; // {id: qty}

function persist() {
  localStorage.setItem('donitasLimit', String(currentLimit));
  localStorage.setItem('donitasSeleccion', JSON.stringify(selectedDonuts));
}

/* ------------------ Utilidades de UI ------------------ */
const elSelected = document.getElementById('selected-count');
const elLimit = document.getElementById('current-limit');
const elResumenTotal = document.getElementById('resumen-total');
const elResumenItems = document.getElementById('resumen-items');

function getSelectedCount() {
  return Object.values(selectedDonuts).reduce((a, n) => a + Number(n||0), 0);
}

function updateTotalsUI() {
  const total = getSelectedCount();
  elSelected.textContent = total;
  elLimit.textContent = currentLimit;
  elResumenTotal.textContent = `${total}/${currentLimit}`;
}

function updateResumenItems() {
  elResumenItems.innerHTML = '';
  Object.entries(selectedDonuts).forEach(([id, qty]) => {
    if (qty > 0) {
      const dona = DONAS.find(d => String(d.id) === String(id));
      const div = document.createElement('div');
      div.textContent = `${qty} x ${dona ? dona.name : 'Sabor ' + id}`;
      elResumenItems.appendChild(div);
    }
  });
}

/* ------------------ Lógica de selección ------------------ */
function setLimit(limit) {
  currentLimit = limit;
  persist();
  document.getElementById('select-12').classList.toggle('active', limit === 12);
  document.getElementById('select-18').classList.toggle('active', limit === 18);
  updateTotalsUI();
}

function refreshCardQty(id) {
  const span = document.querySelector(`.cantidad-selector[data-id="${id}"] .cantidad-actual`);
  if (span) span.textContent = selectedDonuts[id] || 0;
}

function incrementDonut(id) {
  if (getSelectedCount() >= currentLimit) return; // no pasar el límite
  selectedDonuts[id] = (selectedDonuts[id] || 0) + 1;
  persist();
  refreshCardQty(id);
  updateResumenItems();
  updateTotalsUI();
}

function decrementDonut(id) {
  if ((selectedDonuts[id] || 0) > 0) {
    selectedDonuts[id] -= 1;
    if (selectedDonuts[id] === 0) delete selectedDonuts[id];
    persist();
    refreshCardQty(id);
    updateResumenItems();
    updateTotalsUI();
  }
}

document.getElementById('reset-combo').addEventListener('click', () => {
  selectedDonuts = {};
  persist();
  updateResumenItems();
  updateTotalsUI();
  document.querySelectorAll('.cantidad-actual').forEach(e => e.textContent = '0');
});

function incrementDonut(id) {
  if (getSelectedCount() >= currentLimit) return;
  selectedDonuts[id] = (selectedDonuts[id] || 0) + 1;
  persist();
  refreshCardQty(id);
  updateResumenItems();
  updateTotalsUI();

  // animación
  const span = document.querySelector(`.cantidad-selector[data-id="${id}"] .cantidad-actual`);
  span.animate([{ transform: 'scale(1.2)' }, { transform: 'scale(1)' }], { duration: 150 });
}


/* ------------------ Render de cards ------------------ */
function crearCard(dona) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h3>${dona.name}</h3>
    <p>${dona.description}</p>
    <div class="cantidad-selector" data-id="${dona.id}">
      <button type="button" onclick="decrementDonut(${dona.id})">−</button>
      <span class="cantidad-actual">${selectedDonuts[dona.id] || 0}</span>
      <button type="button" onclick="incrementDonut(${dona.id})">+</button>
    </div>
  `;
  return card;
}

function render() {
  const cont = document.getElementById('cards');
  cont.innerHTML = '';
  DONAS.forEach(d => cont.appendChild(crearCard(d)));
}

/* ------------------ Inicio ------------------ */
document.getElementById('select-12').addEventListener('click', () => setLimit(12));
document.getElementById('select-18').addEventListener('click', () => setLimit(18));
render();
setLimit(currentLimit);
updateResumenItems();
updateTotalsUI();

/* Exponer para onclick inline (si más tarde los usás en otro archivo) */
window.incrementDonut = incrementDonut;
window.decrementDonut = decrementDonut;
window.setLimit = setLimit;

function updateTotalsUI() {
  const total = getSelectedCount();
  elSelected.textContent = total;
  elLimit.textContent = currentLimit;
  elResumenTotal.textContent = `${total}/${currentLimit}`;

  // color al llegar al límite
  const totalSel = document.querySelector('.total-selected');
  totalSel.style.color = (total === currentLimit) ? '#25c4ea' : '#f06bb4';
}

</script>
</body>
</html>
